name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux jq

      - name: Run smoke tests
        run: bash scripts/smoke-prototype-skills.sh
