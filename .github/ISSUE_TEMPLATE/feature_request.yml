name: Feature Request
description: Suggest a new feature for Agora Lab
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Feature summary
      description: A brief one-line summary of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this needed?
      description: Explain the motivation or problem this feature would solve.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Describe your proposed solution
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references.
    validations:
      required: false
